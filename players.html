<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportz-Well - Players Directory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1 class="brand">Sportz-Well <span>Performance Intelligence</span></h1>
    <h2 class="title-main">Cricket Academy</h2>
    <p class="title-sub">U14 Squad Players Directory</p>
  </header>

  <div class="container">
    <div class="buttons">
      <button class="secondary" onclick="window.location.href='./dashboard.html'">Back to Dashboard</button>
      <button class="secondary" onclick="window.location.href='./assessment-session.html'">Quarterly Assessment</button>
      <button id="resetDemoBtn" style="display:none;" onclick="resetDemoData()">Reset Demo Data</button>
    </div>

    <div id="statusBox" class="status-box" style="display:none;"></div>

    <section class="summary-grid">
      <article class="summary-card">
        <div class="summary-label">Total Players</div>
        <div id="totalPlayers" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Girls</div>
        <div id="girlsCount" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Boys</div>
        <div id="boysCount" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Needs Attention (At Risk)</div>
        <div id="riskCount" class="summary-value">--</div>
      </article>
    </section>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search by player name..." />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>Age</th>
            <th>Role</th>
            <th>Gender</th>
            <th>Coach Signal</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="playersTableBody">
          <tr>
            <td colspan="6" class="empty-state">Loading players...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    const state = {
      allPlayers: [],
      visiblePlayers: [],
      atRiskCount: 0
    };

    const ui = {
      statusBox: document.getElementById('statusBox'),
      totalPlayers: document.getElementById('totalPlayers'),
      girlsCount: document.getElementById('girlsCount'),
      boysCount: document.getElementById('boysCount'),
      riskCount: document.getElementById('riskCount'),
      searchInput: document.getElementById('searchInput'),
      playersTableBody: document.getElementById('playersTableBody'),
      resetDemoBtn: document.getElementById('resetDemoBtn')
    };

    function showStatus(message, isError = true) {
      ui.statusBox.style.display = 'block';
      ui.statusBox.style.background = isError
        ? 'rgba(255, 107, 107, 0.16)'
        : 'rgba(91, 227, 168, 0.16)';
      ui.statusBox.style.borderColor = isError
        ? 'rgba(255, 107, 107, 0.45)'
        : 'rgba(91, 227, 168, 0.45)';
      ui.statusBox.style.color = isError ? '#ffd7d7' : '#d8ffe8';
      ui.statusBox.textContent = message;
    }

    function hideStatus() {
      ui.statusBox.style.display = 'none';
      ui.statusBox.textContent = '';
    }

    function getSignal(player) {
      const risk = String(player.riskStatus || '').toLowerCase();
      const improvement = Number(player.improvementPct || 0);

      if (risk.includes('risk')) {
        return { label: 'Needs Attention', className: 'risk' };
      }

      if (improvement < 0) {
        return { label: 'Declining', className: 'warn' };
      }

      if (improvement > 0) {
        return { label: 'Improving', className: 'ok' };
      }

      return { label: 'Stable', className: 'warn' };
    }

    function renderSummary(players) {
      const girls = players.filter((p) => p.gender === 'Female').length;
      const boys = players.filter((p) => p.gender === 'Male').length;

      ui.totalPlayers.textContent = players.length;
      ui.girlsCount.textContent = girls;
      ui.boysCount.textContent = boys;
      ui.riskCount.textContent = state.atRiskCount;
    }

    function renderPlayersTable(players) {
      if (!players.length) {
        ui.playersTableBody.innerHTML =
          '<tr><td colspan="6" class="empty-state">No players found for this search.</td></tr>';
        return;
      }

      ui.playersTableBody.innerHTML = players
        .map((player) => {
          const signal = getSignal(player);
          const safeId = encodeURIComponent(player.id || '');
          return `
            <tr>
              <td>${player.name}</td>
              <td>${player.age ?? '--'}</td>
              <td>${player.role || '--'}</td>
              <td>${player.gender || '--'}</td>
              <td><span class="signal ${signal.className}">${signal.label}</span></td>
              <td>
                <button class="small-btn" type="button" onclick="window.location.href='player-profile.html?id=${safeId}'">
                  View Profile
                </button>
              </td>
            </tr>
          `;
        })
        .join('');
    }

    function applySearch() {
      const term = ui.searchInput.value.trim().toLowerCase();
      const filtered = state.allPlayers.filter((player) =>
        String(player.name || '').toLowerCase().includes(term)
      );

      state.visiblePlayers = filtered;
      renderPlayersTable(filtered);
      renderSummary(filtered.length ? filtered : state.allPlayers);
    }

    async function loadDashboardSummary() {
      try {
        const dashboard = await SWPI.fetchDashboard();
        state.atRiskCount = Number(dashboard.summary?.atRiskPlayers || 0);
      } catch (_error) {
        state.atRiskCount = 0;
      }
    }

    async function loadPlayers() {
      hideStatus();

      try {
        if (!SWPI.getToken()) {
          showStatus('Session expired. Please open login page and sign in again.');
          ui.playersTableBody.innerHTML =
            '<tr><td colspan="6" class="empty-state">Please login to load players.</td></tr>';
          return;
        }

        const rows = await SWPI.fetchPlayers();
        const sorted = rows.sort((a, b) => a.name.localeCompare(b.name)).slice(0, 15);

        state.allPlayers = sorted;
        state.visiblePlayers = sorted;

        await loadDashboardSummary();
        renderSummary(sorted);
        renderPlayersTable(sorted);
      } catch (error) {
        showStatus(
          `Unable to load players directory.\nStatus: ${error.status || '--'}\nMessage: ${error.message}`
        );
        ui.playersTableBody.innerHTML =
          '<tr><td colspan="6" class="empty-state">Could not load players.</td></tr>';
      }
    }

    async function handleResetDemo() {
      hideStatus();
      ui.resetDemoBtn.disabled = true;
      ui.resetDemoBtn.textContent = 'Resetting...';

      try {
        await SWPI.resetDemoData();
        showStatus('Demo reset complete: 15 players restored with updated profiles.', false);
        await loadPlayers();
      } catch (error) {
        const fallback =
          'Reset API not available in this backend build. Use backend seed script once: node seedDemoData.js';
        showStatus(
          `Unable to reset from UI.\nStatus: ${error.status || '--'}\nMessage: ${error.message}\n${fallback}`
        );
      } finally {
        ui.resetDemoBtn.disabled = false;
        ui.resetDemoBtn.textContent = 'Reset Demo 15 Players';
      }
    }

    ui.searchInput.addEventListener('input', applySearch);
    ui.resetDemoBtn.addEventListener('click', handleResetDemo);

    loadPlayers();
  </script>
</body>
</html>
