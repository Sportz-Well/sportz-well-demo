<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportz-Well - Players Directory</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style media="print">
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white !important;
      color: #1a1a1a !important;
      font-family: Arial, sans-serif;
      font-size: 11pt;
    }

    header {
      background: linear-gradient(135deg, #003d7a 0%, #0052a3 100%) !important;
      color: white !important;
      padding: 20pt 0 !important;
      margin: 0 0 20pt 0 !important;
      border-bottom: 4pt solid #d4af37 !important;
      page-break-after: avoid;
    }

    header h1.brand {
      font-size: 24pt !important;
      font-weight: bold !important;
      margin: 0 10pt !important;
      color: white !important;
    }

    header h1.brand span {
      color: #d4af37 !important;
      font-size: 18pt !important;
    }

    header h2.title-main {
      font-size: 18pt !important;
      font-weight: bold !important;
      margin: 8pt 10pt 0 !important;
      color: white !important;
    }

    header p.title-sub {
      font-size: 12pt !important;
      margin: 4pt 10pt 0 !important;
      color: #e8e8e8 !important;
      font-style: italic;
    }

    .buttons {
      display: none !important;
    }

    #statusBox {
      display: none !important;
    }

    #trendSection {
      display: none !important;
    }

    .container {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 20pt !important;
    }

    .toolbar {
      display: none !important;
    }

    .summary-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr 1fr 1fr !important;
      gap: 12pt !important;
      margin: 20pt 0 !important;
      page-break-inside: avoid;
    }

    .summary-card {
      background: #f5f5f5 !important;
      border: 2pt solid #003d7a !important;
      padding: 12pt !important;
      text-align: center;
      page-break-inside: avoid;
    }

    .summary-label {
      font-size: 10pt !important;
      font-weight: bold !important;
      color: #003d7a !important;
      margin-bottom: 8pt !important;
      text-transform: uppercase;
      letter-spacing: 0.5pt;
    }

    .summary-value {
      font-size: 20pt !important;
      font-weight: bold !important;
      color: #d4af37 !important;
    }

    .table-wrap {
      margin: 20pt 0 !important;
      page-break-inside: avoid;
    }

    table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin-top: 10pt !important;
    }

    thead {
      background: #003d7a !important;
      color: white !important;
      page-break-after: avoid;
    }

    th {
      padding: 10pt !important;
      text-align: left !important;
      font-weight: bold !important;
      font-size: 10pt !important;
      border: 1pt solid #003d7a !important;
      color: white !important;
    }

    tbody tr {
      page-break-inside: avoid;
      border-bottom: 1pt solid #ddd !important;
    }

    tbody tr:nth-child(even) {
      background: #fafafa !important;
    }

    td {
      padding: 8pt !important;
      font-size: 10pt !important;
      border: 1pt solid #e0e0e0 !important;
    }

    td a {
      color: #003d7a !important;
      text-decoration: none !important;
    }

    button.small-btn {
      display: none !important;
    }

    .empty-state {
      text-align: center !important;
      color: #666 !important;
      font-style: italic;
    }

    .signal {
      font-weight: bold !important;
      padding: 4pt 8pt !important;
      border-radius: 3pt !important;
      display: inline-block !important;
      font-size: 9pt !important;
    }

    .signal.risk {
      background: #ffebee !important;
      color: #c62828 !important;
      border: 1pt solid #c62828 !important;
    }

    .signal.warn {
      background: #fff3e0 !important;
      color: #e65100 !important;
      border: 1pt solid #e65100 !important;
    }

    .signal.ok {
      background: #e8f5e9 !important;
      color: #2e7d32 !important;
      border: 1pt solid #2e7d32 !important;
    }

    .panel {
      background: white !important;
      border: 2pt solid #003d7a !important;
      padding: 15pt !important;
      margin: 15pt 0 !important;
      page-break-inside: avoid;
    }

    .panel h3 {
      font-size: 14pt !important;
      font-weight: bold !important;
      color: #003d7a !important;
      margin: 0 0 12pt 0 !important;
      border-bottom: 2pt solid #d4af37 !important;
      padding-bottom: 8pt !important;
    }

    @page {
      size: A4;
      margin: 0.5in;
      orphans: 3;
      widows: 3;
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="brand">Sportz-Well <span>Performance Intelligence</span></h1>
    <h2 class="title-main">Cricket Academy</h2>
    <p class="title-sub">U14 Squad Players Directory</p>
  </header>

  <div class="container">
    <div class="buttons">
      <button class="secondary" onclick="window.location.href='./dashboard.html'">Back to Dashboard</button>
      <button class="secondary" onclick="window.location.href='./assessment-session.html'">Quarterly Assessment</button>
      <button id="resetDemoBtn" style="display:none;" onclick="resetDemoData()">Reset Demo Data</button>
    </div>

    <div id="statusBox" class="status-box" style="display:none;"></div>

    <section class="summary-grid">
      <article class="summary-card">
        <div class="summary-label">Total Players</div>
        <div id="totalPlayers" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Girls</div>
        <div id="girlsCount" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Boys</div>
        <div id="boysCount" class="summary-value">--</div>
      </article>
      <article class="summary-card">
        <div class="summary-label">Needs Attention (At Risk)</div>
        <div id="riskCount" class="summary-value">--</div>
      </article>
    </section>

    <section class="panel" style="margin: 20px 0; display: none;" id="trendSection">
      <h3>Score Trend - <span id="selectedPlayerName"></span></h3>
      <div class="chart-wrap" style="height: 300px;">
        <canvas id="scoreChart"></canvas>
      </div>
    </section>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search by player name..." />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>Age</th>
            <th>Standard</th>
            <th>Division</th>
            <th>School ID No</th>
            <th>Aadhaar No</th>
            <th>Role</th>
            <th>Gender</th>
            <th>Coach Signal</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="playersTableBody">
          <tr>
            <td colspan="10" class="empty-state">Loading players...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    const state = {
      allPlayers: [],
      visiblePlayers: [],
      atRiskCount: 0,
      scoreChartRef: null
    };

    const ui = {
      statusBox: document.getElementById('statusBox'),
      totalPlayers: document.getElementById('totalPlayers'),
      girlsCount: document.getElementById('girlsCount'),
      boysCount: document.getElementById('boysCount'),
      riskCount: document.getElementById('riskCount'),
      searchInput: document.getElementById('searchInput'),
      playersTableBody: document.getElementById('playersTableBody'),
      resetDemoBtn: document.getElementById('resetDemoBtn'),
      trendSection: document.getElementById('trendSection'),
      selectedPlayerName: document.getElementById('selectedPlayerName'),
      scoreChart: document.getElementById('scoreChart')
    };

    function showStatus(message, isError = true) {
      ui.statusBox.style.display = 'block';
      ui.statusBox.style.background = isError
        ? 'rgba(255, 107, 107, 0.16)'
        : 'rgba(91, 227, 168, 0.16)';
      ui.statusBox.style.borderColor = isError
        ? 'rgba(255, 107, 107, 0.45)'
        : 'rgba(91, 227, 168, 0.45)';
      ui.statusBox.style.color = isError ? '#ffd7d7' : '#d8ffe8';
      ui.statusBox.textContent = message;
    }

    function hideStatus() {
      ui.statusBox.style.display = 'none';
      ui.statusBox.textContent = '';
    }

    function getSignal(player) {
      const risk = String(player.riskStatus || '').toLowerCase();
      const improvement = Number(player.improvementPct || 0);

      if (risk.includes('risk')) {
        return { label: 'Needs Attention', className: 'risk' };
      }

      if (improvement < 0) {
        return { label: 'Declining', className: 'warn' };
      }

      if (improvement > 0) {
        return { label: 'Improving', className: 'ok' };
      }

      return { label: 'Stable', className: 'warn' };
    }

    function calculateAge(dob) {
      if (!dob) return null;
      const birthDate = new Date(dob);
      if (isNaN(birthDate.getTime())) return null;
      const diff = Date.now() - birthDate.getTime();
      const ageDate = new Date(diff);
      return Math.abs(ageDate.getUTCFullYear() - 1970);
    }

    function renderSummary(players) {
      const girls = players.filter((p) => p.gender === 'Female').length;
      const boys = players.filter((p) => p.gender === 'Male').length;

      ui.totalPlayers.textContent = players.length;
      ui.girlsCount.textContent = girls;
      ui.boysCount.textContent = boys;
      ui.riskCount.textContent = state.atRiskCount;
    }

    function renderPlayersTable(players) {
      if (!players.length) {
        ui.playersTableBody.innerHTML =
          '<tr><td colspan="10" class="empty-state">No players found for this search.</td></tr>';
        return;
      }

      ui.playersTableBody.innerHTML = players
        .map((player) => {
          const signal = getSignal(player);
          const safeId = encodeURIComponent(player.id || '');
          const std = player.std || player.standard || player.Standard || '--';
          const div = player.div || player.division || player.Division || '--';
          const age = player.age || calculateAge(player.dob || player.date_of_birth || player.dateOfBirth) || '--';
          const schoolIdNo = player.school_id_no || '--';
          const aadhaarNo = player.aadhaar_card_no || '--';
          const playerNameLink = `<a href="#" onclick="event.preventDefault(); loadPlayerTrend('${safeId}', '${player.name}');" style="cursor: pointer; color: #d4af37; text-decoration: none;">${player.name}</a>`;
          return `
            <tr>
              <td>${playerNameLink}</td>
              <td>${age}</td>
              <td>${std}</td>
              <td>${div}</td>
              <td>${schoolIdNo}</td>
              <td>${aadhaarNo}</td>
              <td>${player.role || '--'}</td>
              <td>${player.gender || '--'}</td>
              <td><span class="signal ${signal.className}">${signal.label}</span></td>
              <td>
                <button class="small-btn" type="button" onclick="window.location.href='player-profile.html?id=${safeId}'">
                  View Profile
                </button>
              </td>
            </tr>
          `;
        })
        .join('');
    }

    function applySearch() {
      const term = ui.searchInput.value.trim().toLowerCase();
      const filtered = state.allPlayers.filter((player) =>
        String(player.name || '').toLowerCase().includes(term)
      );

      state.visiblePlayers = filtered;
      renderPlayersTable(filtered);
      renderSummary(filtered.length ? filtered : state.allPlayers);
    }

    async function loadDashboardSummary() {
      try {
        const dashboard = await SWPI.fetchDashboard();
        state.atRiskCount = Number(dashboard.summary?.atRiskPlayers || 0);
      } catch (_error) {
        state.atRiskCount = 0;
      }
    }

    async function loadPlayers() {
      hideStatus();

      try {
        const token = SWPI.getToken();
        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        const rows = await SWPI.fetchPlayers();
        const sorted = rows.sort((a, b) => a.name.localeCompare(b.name)).slice(0, 15);

        state.allPlayers = sorted;
        state.visiblePlayers = sorted;

        await loadDashboardSummary();
        renderSummary(sorted);
        renderPlayersTable(sorted);
      } catch (error) {
        showStatus(
          `Unable to load players directory.\nStatus: ${error.status || '--'}\nMessage: ${error.message}`
        );
        ui.playersTableBody.innerHTML =
          '<tr><td colspan="10" class="empty-state">Could not load players.</td></tr>';
      }
    }

    async function handleResetDemo() {
      hideStatus();
      ui.resetDemoBtn.disabled = true;
      ui.resetDemoBtn.textContent = 'Resetting...';

      try {
        await SWPI.resetDemoData();
        showStatus('Demo reset complete: 15 players restored with updated profiles.', false);
        await loadPlayers();
      } catch (error) {
        const fallback =
          'Reset API not available in this backend build. Use backend seed script once: node seedDemoData.js';
        showStatus(
          `Unable to reset from UI.\nStatus: ${error.status || '--'}\nMessage: ${error.message}\n${fallback}`
        );
      } finally {
        ui.resetDemoBtn.disabled = false;
        ui.resetDemoBtn.textContent = 'Reset Demo 15 Players';
      }
    }

    ui.searchInput.addEventListener('input', applySearch);
    ui.resetDemoBtn.addEventListener('click', handleResetDemo);

    async function fetchPlayerTrend(playerId) {
      const paths = [
        `/api/v1/players/${encodeURIComponent(playerId)}/quarterly-trend`,
        `/api/players/${encodeURIComponent(playerId)}/quarterly-trend`,
        `/api/v1/analytics/players/${encodeURIComponent(playerId)}/trend`
      ];

      try {
        const response = await SWPI.requestFirst(paths, { method: 'GET' });
        const data = Array.isArray(response) ? response : response.data || response.trend || [];
        return Array.isArray(data) ? data : [];
      } catch (_error) {
        return [];
      }
    }

    function renderScoreTrendChart(trendData) {
      const labels = trendData.map((row) => row.quarterlyCycle || row.quarter || 'Quarter');
      const values = trendData.map((row) => {
        const n = row.overallScore ?? row.overall_score ?? row.averageOverallScore ?? row.average_overall_score ?? null;
        return n === null || n === undefined ? null : Number(n);
      });

      if (state.scoreChartRef) {
        state.scoreChartRef.destroy();
      }

      state.scoreChartRef = new Chart(ui.scoreChart, {
        type: 'line',
        data: {
          labels: labels.length ? labels : ['No Data'],
          datasets: [
            {
              label: 'Score Trend',
              data: values.length ? values : [null],
              borderColor: '#d4af37',
              backgroundColor: 'rgba(212,175,55,0.1)',
              fill: true,
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 5,
              pointBackgroundColor: '#1a1a1a',
              pointBorderColor: '#d4af37',
              pointBorderWidth: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#1a1a1a', font: { weight: 'bold', size: 12 } }
            }
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              ticks: { color: '#4a4a4a', stepSize: 20 },
              grid: { color: '#e0e0e0' }
            },
            x: {
              ticks: { color: '#4a4a4a' },
              grid: { color: '#e0e0e0' }
            }
          }
        }
      });
    }

    async function loadPlayerTrend(playerId, playerName) {
      try {
        ui.selectedPlayerName.textContent = playerName;
        ui.trendSection.style.display = 'block';
        
        const trendData = await fetchPlayerTrend(playerId);
        
        if (trendData && trendData.length > 0) {
          renderScoreTrendChart(trendData);
        } else {
          if (state.scoreChartRef) {
            state.scoreChartRef.destroy();
            state.scoreChartRef = null;
          }
          ui.scoreChart.getContext('2d').clearRect(0, 0, ui.scoreChart.width, ui.scoreChart.height);
        }
        
        ui.trendSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (error) {
        console.error('Error loading player trend:', error);
        showStatus(`Unable to load score trend. ${error.message}`);
      }
    }

    loadPlayers();
  </script>
</body>
</html>
