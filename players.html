<!DOCTYPE html>
<html>

<head>

<title>Sportz-Well Players</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0c233f;
color:white;
}

header{
padding:20px 40px;
background:#0c233f;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
color:#f0c24b;
margin:0;
}

.container{
padding:50px;
}

.card{
background:#1e3a5c;
padding:20px;
border-radius:10px;
}

button{
background:#f0c24b;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
}

th{
opacity:0.8;
}

a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<header>

<div>

<h1>Sportz-Well</h1>

<div style="opacity:0.8">
Structured Performance Intelligence
</div>

</div>

<button onclick="logout()">Logout</button>

</header>


<div class="container">

<button onclick="window.location.href='dashboard.html'">
Back to Dashboard
</button>

<h2 style="margin-top:20px;">Players Directory</h2>


<div class="card" style="margin-top:20px;">

<table>

<thead>

<tr>

<th>Name</th>
<th>Age</th>
<th>Role</th>
<th>Latest Score</th>
<th>Improvement %</th>
<th>Status</th>

</tr>

</thead>

<tbody id="playersTableBody">

</tbody>

</table>

</div>

</div>


<script src="app.js"></script>

<script>

async function loadPlayers(){

const tableBody = document.getElementById("playersTableBody");
const token = localStorage.getItem("token");

if(!token){
window.location.href="index.html";
return;
}

try{

const response = await fetch("https://sportz-well-backend.onrender.com/api/players", {
headers: {
"Authorization": "Bearer " + token
}
});

const players = await response.json();

if(!response.ok){
tableBody.innerHTML = "<tr><td colspan='6'>Unable to load players</td></tr>";
return;
}

if(!Array.isArray(players) || players.length === 0){
tableBody.innerHTML = "<tr><td colspan='6'>No players found</td></tr>";
return;
}

tableBody.innerHTML = "";

players.forEach(player => {
const latestScore = player.latest_score ?? 0;
const improvementPct = player.improvement_pct ?? 0;
const status = latestScore < 60 ? "At Risk" : "On Track";
const playerName = player.name ?? "-";
const playerId = player.id;
const nameCell = playerId !== undefined && playerId !== null
? `<a href="player-profile.html?id=${encodeURIComponent(playerId)}">${playerName}</a>`
: playerName;

tableBody.innerHTML += `
<tr>
<td>${nameCell}</td>
<td>${player.age ?? "-"}</td>
<td>${player.role ?? "-"}</td>
<td>${latestScore}</td>
<td>${improvementPct}%</td>
<td>${status}</td>
</tr>
`;
});

}catch(error){
console.error("Players load failed:", error);
tableBody.innerHTML = "<tr><td colspan='6'>Server error while loading players</td></tr>";
}

}

function logout(){

localStorage.removeItem("token");

window.location.href="index.html";

}

loadPlayers();

</script>

</body>

</html>
