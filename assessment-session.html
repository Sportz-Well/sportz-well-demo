<!DOCTYPE html>
<html>
<head>
<title>Quarterly Assessment</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0c233f;
color:white;
}

header{
padding:20px 40px;
background:#0c233f;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
color:#f0c24b;
margin:0;
}

.container{
padding:40px;
}

.card{
background:#1e3a5c;
padding:20px;
border-radius:10px;
margin-top:20px;
}

button{
background:#f0c24b;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
text-align:left;
}

input{
width:72px;
padding:6px;
background:#2c4a6f;
border:none;
border-radius:4px;
color:white;
text-align:center;
}

.small-note{
opacity:0.75;
font-size:12px;
margin-top:8px;
}
</style>
</head>
<body>
<header>
<div>
<h1>Sportz-Well</h1>
<div style="opacity:0.8">Structured Performance Intelligence</div>
</div>
<button onclick="window.logout()">Logout</button>
</header>

<div class="container">
<div style="display:flex;align-items:center;gap:20px;">
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
<h2 style="margin:0;">Quarterly Assessment Entry</h2>
</div>

<select id="quarterSelect" style="padding:6px;margin-top:15px;">
<option value="1">Quarter 1</option>
<option value="2">Quarter 2</option>
<option value="3">Quarter 3</option>
<option value="4">Quarter 4</option>
</select>

<div class="card">
<table>
<thead>
<tr>
<th>Player</th>
<th>Physical</th>
<th>Skill</th>
<th>Mental</th>
<th>Coach</th>
</tr>
</thead>
<tbody id="assessmentTable"></tbody>
</table>

<div class="small-note">Enter scores (0-100). Leave a row blank to skip that player.</div>

<br>
<button id="saveAssessmentBtn" onclick="window.saveAssessment()">Save Assessment</button>
</div>
</div>

<script>
const API_BASE = "https://sportz-well-backend.onrender.com/api";

function getToken() {
return localStorage.getItem("token");
}

function parseScore(value) {
if (value === "" || value === null || value === undefined) {
return null;
}
const n = parseInt(value, 10);
return Number.isNaN(n) ? null : n;
}

function allScoresProvided(scores) {
return scores.every(function (s) { return s !== null; });
}

function validRange(scores) {
return scores.every(function (s) { return s >= 0 && s <= 100; });
}

function calculateOverall(physical, skill, mental, coach) {
return Math.round((physical + skill + mental + coach) / 4);
}

window.logout = function () {
localStorage.removeItem("token");
window.location.href = "index.html";
};

window.loadPlayers = async function () {
const token = getToken();
if (!token) {
window.location.href = "index.html";
return;
}

try {
const response = await fetch(API_BASE + "/players", {
headers: {
Authorization: "Bearer " + token
}
});

if (!response.ok) {
alert("Unable to load players.");
return;
}

const players = await response.json();
const tableBody = document.getElementById("assessmentTable");
tableBody.innerHTML = "";

if (!Array.isArray(players) || players.length === 0) {
tableBody.innerHTML = "<tr><td colspan='5'>No players found</td></tr>";
return;
}

players.forEach(function (player) {
const row = document.createElement("tr");
row.setAttribute("data-player-id", String(player.id));
row.innerHTML =
"<td>" + (player.name || "-") + "</td>" +
"<td><input type='number' min='0' max='100' class='physical-input'></td>" +
"<td><input type='number' min='0' max='100' class='skill-input'></td>" +
"<td><input type='number' min='0' max='100' class='mental-input'></td>" +
"<td><input type='number' min='0' max='100' class='coach-input'></td>";
tableBody.appendChild(row);
});

} catch (error) {
console.error("Load players failed:", error);
alert("Server error while loading players.");
}
};

window.saveAssessment = async function () {
const token = getToken();
if (!token) {
window.location.href = "index.html";
return;
}

const rows = document.querySelectorAll("#assessmentTable tr[data-player-id]");
let savedCount = 0;

for (const row of rows) {
const userId = parseInt(row.getAttribute("data-player-id"), 10);
const physical = parseScore(row.querySelector(".physical-input").value);
const skill = parseScore(row.querySelector(".skill-input").value);
const mental = parseScore(row.querySelector(".mental-input").value);
const coach = parseScore(row.querySelector(".coach-input").value);

const scores = [physical, skill, mental, coach];

if (scores.every(function (s) { return s === null; })) {
continue;
}

if (!allScoresProvided(scores)) {
alert("Please fill all 4 scores for each player row you want to save.");
return;
}

if (!validRange(scores)) {
alert("Scores must be between 0 and 100.");
return;
}

const overall = calculateOverall(physical, skill, mental, coach);

const payload = {
user_id: userId,
physical_score: physical,
skill_score: skill,
mental_score: mental,
overall_score: overall,
improvement_pct: 0
};

const response = await fetch("https://sportz-well-backend.onrender.com/api/assessments", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + token
},
body: JSON.stringify(payload)
});

if (!response.ok) {
let errorBody = {};
try {
errorBody = await response.json();
} catch (e) {
errorBody = {};
}
alert(errorBody.error || "Failed to save one or more assessments.");
return;
}

savedCount++;
}

if (savedCount === 0) {
alert("Enter scores for at least one player.");
return;
}

alert("Assessment saved successfully");
window.location.href = "dashboard.html";
};

document.addEventListener("DOMContentLoaded", function () {
window.loadPlayers();
});
</script>
</body>
</html>
