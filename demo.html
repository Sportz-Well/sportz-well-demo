<!DOCTYPE html>
<html>
<head>
  <title>SWPI Live Demo</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #132f57;
      margin: 15px;
      padding: 25px;
      border-radius: 12px;
      width: 220px;
    }

    h1 { margin-bottom: 30px; }
    h2 { margin: 10px 0; }
  </style>
</head>

<body>

<h1>SPORTZ-WELL PERFORMANCE INTELLIGENCE</h1>
<h3>Live Demo Dashboard</h3>

<div class="grid">
  <div class="card">
    <h2 id="players">--</h2>
    <p>Total Players</p>
  </div>

  <div class="card">
    <h2 id="avg">--</h2>
    <p>Average Score</p>
  </div>

  <div class="card">
    <h2 id="latest">--</h2>
    <p>Latest Score</p>
  </div>

  <div class="card">
    <h2 id="risk">--</h2>
    <p>At Risk Players</p>
  </div>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch('https://sportz-well-backend.onrender.com/api/v1/analytics/dashboard');
    const data = await res.json();

    document.getElementById('players').innerText = data.total_players;
    document.getElementById('avg').innerText = data.avg_score;
    document.getElementById('latest').innerText = data.latest_score;
    document.getElementById('risk').innerText = data.at_risk;

  } catch (e) {
    alert("Backend not reachable");
  }
}

loadData();
</script>

</body>
</html>
