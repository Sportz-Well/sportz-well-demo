<!DOCTYPE html>
<html>

<head>

<title>Player Profile</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0c233f;
color:white;
}

header{
padding:20px 40px;
background:#0c233f;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
color:#f0c24b;
margin:0;
}

.container{
padding:40px;
}

.card{
background:#1e3a5c;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(220px,1fr));
gap:16px;
margin-top:10px;
}

.kpi{
background:#2c4a6f;
border-radius:8px;
padding:14px;
}

.kpi-label{
opacity:0.8;
font-size:13px;
margin-bottom:6px;
}

.kpi-value{
font-size:20px;
font-weight:bold;
}

button{
background:#f0c24b;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#progressChart{
max-height:260px;
}

</style>

</head>

<body>

<header>

<div>

<h1>Sportz-Well</h1>

<div style="opacity:0.8">
Structured Performance Intelligence
</div>

</div>

<button onclick="logout()">Logout</button>

</header>


<div class="container">

<button onclick="window.location.href='players.html'">
Back to Players
</button>

<h2 style="margin-top:20px;">Player Profile</h2>

<div class="card">

<h3 style="margin-top:0;">Player Overview</h3>

<div class="grid">
<div class="kpi">
<div class="kpi-label">Player Name</div>
<div class="kpi-value" id="playerName">--</div>
</div>

<div class="kpi">
<div class="kpi-label">Date of Birth</div>
<div class="kpi-value" id="playerDob">--</div>
</div>

<div class="kpi">
<div class="kpi-label">Role</div>
<div class="kpi-value" id="playerRole">--</div>
</div>

<div class="kpi">
<div class="kpi-label">Gender</div>
<div class="kpi-value" id="playerGender">--</div>
</div>

<div class="kpi">
<div class="kpi-label">Latest Score</div>
<div class="kpi-value" id="latestScore">--</div>
</div>

<div class="kpi">
<div class="kpi-label">Improvement %</div>
<div class="kpi-value" id="improvementPct">--</div>
</div>
</div>

</div>

<div class="card">
<h3 style="margin-top:0;">Progress Trend</h3>
<div id="progressEmpty" style="opacity:0.8;">Loading progress...</div>
<canvas id="progressChart" style="margin-top:12px;"></canvas>
</div>

</div>


<script>

let progressChart = null;

function logout(){
localStorage.removeItem("token");
window.location.href="index.html";
}

function safeText(value){
return value === null || value === undefined || value === "" ? "--" : value;
}

function formatDate(value){
if(!value){
return "--";
}

const datePart = String(value).split("T")[0];
const bits = datePart.split("-");

if(bits.length !== 3){
return safeText(value);
}

const year = bits[0];
const month = bits[1];
const day = bits[2];

return `${day}/${month}/${year}`;
}

function formatShortDate(value){
if(!value){
return "--";
}

const datePart = String(value).split("T")[0];
const bits = datePart.split("-");

if(bits.length !== 3){
return value;
}

return `${bits[2]}/${bits[1]}`;
}

async function loadPlayerProgress(playerId, token){
const emptyState = document.getElementById("progressEmpty");
const chartCanvas = document.getElementById("progressChart");

try{
const progressRes = await fetch(`https://sportz-well-backend.onrender.com/api/player/${playerId}/progress`, {
headers: {
"Authorization": "Bearer " + token
}
});

if(!progressRes.ok){
emptyState.innerText = "Progress trend unavailable right now.";
chartCanvas.style.display = "none";
return;
}

const progressRows = await progressRes.json();

if(!Array.isArray(progressRows) || progressRows.length === 0){
emptyState.innerText = "No assessment history available yet.";
chartCanvas.style.display = "none";
return;
}

emptyState.innerText = "";
chartCanvas.style.display = "block";

const labels = progressRows.map((row,idx)=>`A${idx+1} (${formatShortDate(row.created_at)})`);
const scores = progressRows.map((row)=>Number(row.overall_score ?? 0));

if(progressChart){
progressChart.destroy();
}

progressChart = new Chart(chartCanvas, {
type: "line",
data: {
labels: labels,
datasets: [{
label: "Overall Score",
data: scores,
borderColor: "#f0c24b",
backgroundColor: "rgba(240,194,75,0.2)",
tension: 0.3,
fill: true
}]
},
options: {
plugins: {
legend: {
labels: { color: "#ffffff" }
}
},
scales: {
x: {
ticks: { color: "#ffffff" },
grid: { color: "rgba(255,255,255,0.1)" }
},
y: {
min: 0,
max: 100,
ticks: { color: "#ffffff" },
grid: { color: "rgba(255,255,255,0.1)" }
}
}
}
});

}catch(error){
console.error("Progress load failed:", error);
emptyState.innerText = "Progress trend unavailable right now.";
chartCanvas.style.display = "none";
}
}

async function loadPlayer(){

const playerId = new URLSearchParams(window.location.search).get("id");
const token = localStorage.getItem("token");

if(!token){
window.location.href="index.html";
return;
}

if(!playerId){
alert("Missing player ID");
window.location.href="players.html";
return;
}

try{
const res = await fetch(`https://sportz-well-backend.onrender.com/api/player/${playerId}`, {
headers: {
"Authorization": "Bearer " + token
}
});

if(!res.ok){
alert("Unable to load player profile");
window.location.href="players.html";
return;
}

const data = await res.json();

const player = data.player || data;

const name = player.name ?? data.name;
const dob = player.dob ?? data.dob ?? data.date_of_birth;
const role = player.role ?? data.role;
const gender = player.gender ?? data.gender;

let latestScore = player.overall_score ?? data.overall_score ?? player.latest_score ?? data.latest_score;
let improvementPct = player.improvement_pct ?? data.improvement_pct;

if((latestScore === null || latestScore === undefined) && Array.isArray(data.trend) && data.trend.length > 0){
latestScore = data.trend[data.trend.length - 1].score;
}

if(improvementPct === null || improvementPct === undefined || improvementPct === ""){
improvementPct = "--";
}

document.getElementById("playerName").innerText = safeText(name);
document.getElementById("playerDob").innerText = formatDate(dob);
document.getElementById("playerRole").innerText = safeText(role);
document.getElementById("playerGender").innerText = safeText(gender);
document.getElementById("latestScore").innerText = safeText(latestScore);
document.getElementById("improvementPct").innerText = improvementPct === "--" ? "--" : `${improvementPct}%`;
await loadPlayerProgress(playerId, token);

}catch(error){
console.error("Profile load failed:", error);
alert("Server error while loading profile");
window.location.href="players.html";
}

}

loadPlayer();

</script>


</body>
</html>
