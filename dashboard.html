<!DOCTYPE html>
<html>
<head>
  <title>SWPI Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #132f57;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
      text-align: center;
    }
    h1 {
      text-align: center;
    }
  </style>
</head>

<body>

<h1>SPORTZ-WELL PERFORMANCE INTELLIGENCE</h1>

<div class="card">
  <h3>Total Players</h3>
  <p id="players">--</p>
</div>

<div class="card">
  <h3>Avg Score</h3>
  <p id="avg">--</p>
</div>

<div class="card">
  <h3>Latest Score</h3>
  <p id="latest">--</p>
</div>

<div class="card">
  <h3>At Risk</h3>
  <p id="risk">--</p>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch('https://sportz-well-backend.onrender.com/api/v1/analytics/dashboard');
    const data = await res.json();

    document.getElementById('players').innerText = data.total_players;
    document.getElementById('avg').innerText = data.avg_score;
    document.getElementById('latest').innerText = data.latest_score;
    document.getElementById('risk').innerText = data.at_risk;

  } catch (err) {
    console.error(err);
    alert("Dashboard failed to load");
  }
}

loadDashboard();
</script>

</body>
</html>
