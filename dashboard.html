<!DOCTYPE html>
<html>

<head>

<title>Sportz-Well Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0c233f;
color:white;
}

header{
padding:20px 40px;
background:#0c233f;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e3a5c;
padding:25px;
border-radius:10px;
}

.card-title{
opacity:0.8;
margin-bottom:10px;
}

.card-value{
font-size:22px;
font-weight:bold;
}

.buttons{
margin-top:20px;
margin-bottom:40px;
}

button{
background:#f0c24b;
border:none;
padding:10px 15px;
margin-right:10px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.chart-container{
width:350px;
}

</style>

</head>

<body>

<header>

<h1 style="color:#f0c24b;margin:0;">Sportz-Well</h1>

<p style="margin:4px 0 0 0;opacity:0.8;">
Structured Performance Intelligence
</p>

<h2 style="margin-top:15px;font-weight:600;">
Singhania Cricket Academy
</h2>

<p style="opacity:0.7;">
U14 Squad Performance Dashboard
</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">Latest Score</div>
<div class="card-value" id="latestScore">--</div>
</div>

<div class="card">
<div class="card-title">Quarter Growth</div>
<div class="card-value" id="quarterGrowth">--</div>
</div>

<div class="card">
<div class="card-title">Quarters</div>
<div class="card-value">4</div>
</div>

<div class="card">
<div class="card-title">Top Improver</div>
<div class="card-value" id="topImprover">--</div>
</div>

<div class="card">
<div class="card-title">At Risk</div>
<div class="card-value" id="atRisk">--</div>
</div>

<div class="card">
<div class="card-title">Avg Improve %</div>
<div class="card-value" id="avgImprove">--</div>
</div>

</div>

<div class="buttons">

<button onclick="window.location.href='players.html'">
View Players Directory
</button>

<button onclick="window.location.href='add-player.html'">
Add Player
</button>

<button onclick="window.location.href='assessment-session.html'">
Quarterly Assessment
</button>

</div>

<h3>Risk Distribution</h3>

<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>

</div>

<script src="./app.js"></script>

</body>
</html>
