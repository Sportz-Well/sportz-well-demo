<!DOCTYPE html>
<html>

<head>

<title>Sportz-Well Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0c233f;
color:white;
}

header{
padding:20px 40px;
background:#0c233f;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e3a5c;
padding:25px;
border-radius:10px;
}

.insight-section{
margin-top:-10px;
margin-bottom:30px;
}

.insight-card{
background:#1e3a5c;
padding:18px;
border-radius:10px;
line-height:1.5;
opacity:0.95;
}

.card-title{
opacity:0.8;
margin-bottom:10px;
}

.card-value{
font-size:22px;
font-weight:bold;
}

.buttons{
margin-top:20px;
margin-bottom:40px;
}

button{
background:#f0c24b;
border:none;
padding:10px 15px;
margin-right:10px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.chart-container{
width:350px;
}

</style>

</head>

<body>

<header>

<h1 style="color:#f0c24b;margin:0;">Sportz-Well</h1>

<p style="margin:4px 0 0 0;opacity:0.8;">
Structured Performance Intelligence
</p>

<h2 style="margin-top:15px;font-weight:600;">
Singhania Cricket Academy
</h2>

<p style="opacity:0.7;">
U14 Squad Performance Dashboard
</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">Latest Score</div>
<div class="card-value" id="latestScore">--</div>
</div>

<div class="card">
<div class="card-title">Quarter Growth</div>
<div class="card-value" id="quarterGrowth">--</div>
</div>

<div class="card">
<div class="card-title">Quarters</div>
<div class="card-value">4</div>
</div>

<div class="card">
<div class="card-title">Top Improver</div>
<div class="card-value" id="topImprover">--</div>
</div>

<div class="card">
<div class="card-title">Top Performer This Quarter</div>
<div class="card-value" id="topPerformer">--</div>
</div>

<div class="card">
<div class="card-title">At Risk</div>
<div class="card-value" id="atRisk">--</div>
</div>

<div class="card">
<div class="card-title">Avg Improve %</div>
<div class="card-value" id="avgImprove">--</div>
</div>

</div>

<div id="adminTools" style="display:none;margin-top:-20px;margin-bottom:18px;">
<button id="resetDemoBtn" onclick="resetDemoData()">Reset Demo Data</button>
<span id="resetStatus" style="margin-left:10px;opacity:0.8;font-size:13px;"></span>
</div>

<div class="insight-section">
<h3 style="margin:0 0 10px 0;">Coach Insight</h3>
<div id="coachInsight" class="insight-card"></div>
</div>

<p id="lastUpdated" style="opacity:0.75;font-size:13px;margin-top:-8px;margin-bottom:20px;">
Last updated at --
</p>

<div class="buttons">

<button onclick="window.location.href='players.html'">
View Players Directory
</button>

<button onclick="window.location.href='add-player.html'">
Add Player
</button>

<button onclick="window.location.href='assessment-session.html'">
Quarterly Assessment
</button>

</div>

<h3>Risk Distribution</h3>

<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>

</div>

<script>
let riskChart = null;

function getTokenRole(token){
  try{
    const payload = token.split(".")[1];
    const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
    const decoded = JSON.parse(atob(normalized));
    return decoded.role || "";
  }catch(err){
    return "";
  }
}

function setupAdminTools(token){
  const role = getTokenRole(token);
  const adminTools = document.getElementById("adminTools");

  if(role === "admin"){
    adminTools.style.display = "block";
  }else{
    adminTools.style.display = "none";
  }
}

async function resetDemoData(){
  const token = localStorage.getItem("token");
  const resetBtn = document.getElementById("resetDemoBtn");
  const resetStatus = document.getElementById("resetStatus");

  if(!token){
    window.location.href = "index.html";
    return;
  }

  if(!confirm("Reset demo data now? This will recreate the coach demo dataset.")){
    return;
  }

  resetBtn.disabled = true;
  resetStatus.innerText = "Resetting demo data...";

  try{
    const response = await fetch("https://sportz-well-backend.onrender.com/api/reset-demo", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if(!response.ok){
      throw new Error("Reset failed");
    }

    resetStatus.innerText = "Demo data reset complete.";
    await loadDashboardMetrics();
    alert("Demo data reset successfully.");

  }catch(error){
    console.error(error);
    resetStatus.innerText = "Reset failed. Try again.";
    alert("Unable to reset demo data");
  }finally{
    resetBtn.disabled = false;
  }
}

async function loadDashboardMetrics(){
  const token = localStorage.getItem("token");

  if(!token){
    window.location.href = "index.html";
    return;
  }

  setupAdminTools(token);

  try{
    const response = await fetch("https://sportz-well-backend.onrender.com/api/dashboard", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if(!response.ok){
      throw new Error("Dashboard API failed");
    }

    const data = await response.json();

    document.getElementById("latestScore").innerText = data.latest_score ?? 0;
    const quarterGrowthValue = Number(data.quarter_growth ?? 0);
    const quarterGrowthText = quarterGrowthValue > 0 ? `+${quarterGrowthValue}` : `${quarterGrowthValue}`;
    document.getElementById("quarterGrowth").innerText = quarterGrowthText;
    document.getElementById("topImprover").innerText = "--";
    document.getElementById("atRisk").innerText = data.at_risk_count ?? 0;
    document.getElementById("avgImprove").innerText = (data.avg_improvement ?? 0) + "%";

    let totalPlayers = 0;

    try{
      const playersResponse = await fetch("https://sportz-well-backend.onrender.com/api/players", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      if(playersResponse.ok){
        const players = await playersResponse.json();

        if(Array.isArray(players)){
          totalPlayers = players.length;

          const scoredPlayers = players
          .filter((p)=>p.overall_score !== null && p.overall_score !== undefined)
          .sort((a,b)=>Number(b.overall_score) - Number(a.overall_score));

          if(scoredPlayers.length > 0){
            const topPlayer = scoredPlayers[0];
            document.getElementById("topPerformer").innerText = `${topPlayer.name} (${topPlayer.overall_score})`;
          }else{
            document.getElementById("topPerformer").innerText = "--";
          }

          if(data.top_improver !== null && data.top_improver !== undefined){
            const improverPlayer = players.find((p)=>Number(p.id) === Number(data.top_improver));
            if(improverPlayer){
              const improverPct = improverPlayer.improvement_pct;
              if(improverPct !== null && improverPct !== undefined){
                const sign = Number(improverPct) > 0 ? "+" : "";
                document.getElementById("topImprover").innerText = `${improverPlayer.name} (${sign}${improverPct}%)`;
              }else{
                document.getElementById("topImprover").innerText = improverPlayer.name;
              }
            }else{
              document.getElementById("topImprover").innerText = "Player " + data.top_improver;
            }
          }else{
            document.getElementById("topImprover").innerText = "--";
          }
        }
      }
    }catch(err){
      console.error("Top performer fetch failed:", err);
      document.getElementById("topPerformer").innerText = "--";
      document.getElementById("topImprover").innerText = data.top_improver !== null ? ("Player " + data.top_improver) : "--";
    }

    let insight = "";

    if(data.at_risk_count >= 2){
      insight = "⚠️ " + data.at_risk_count + " players are currently in the risk zone. Immediate skill reinforcement recommended.";
    }
    else if(data.avg_improvement > 0){
      insight = "📈 Overall team improvement trend is positive. Continue current training intensity.";
    }
    else{
      insight = "📊 Monitor player progress closely this quarter.";
    }

    document.getElementById("coachInsight").innerText = insight;
    document.getElementById("lastUpdated").innerText = "Last updated at " + new Date().toLocaleString("en-IN");

    const atRisk = Number(data.at_risk_count ?? 0);
    const ctx = document.getElementById("riskChart");
    const otherCount = totalPlayers > 0 ? Math.max(0, totalPlayers - atRisk) : Math.max(0, 1);
    const totalForRisk = atRisk + otherCount;
    const atRiskPct = totalForRisk > 0 ? Math.round((atRisk / totalForRisk) * 100) : 0;
    const onTrackPct = totalForRisk > 0 ? 100 - atRiskPct : 0;

    if(riskChart){
      riskChart.destroy();
    }

    riskChart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: [`At Risk ${atRiskPct}%`, `On Track ${onTrackPct}%`],
        datasets: [{
          data: [atRisk, otherCount],
          backgroundColor: ["#ff6b6b", "#4aa3ff"]
        }]
      },
      options: {
        plugins: {
          legend: {
            labels: {
              color: "#ffffff"
            }
          }
        }
      }
    });

  }catch(error){
    console.error(error);
    alert("Unable to load dashboard metrics");
  }
}

loadDashboardMetrics();
</script>

</body>
</html>
