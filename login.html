<!DOCTYPE html>
<html>

<head>

<title>Sportz-Well Login</title>

<link rel="stylesheet" href="styles.css">

<script src="app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0c233f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#1c3b63;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
background:#f2c14e;
border:none;
padding:12px;
width:95%;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

</style>

</head>


<body>

<div class="login-box">

<h2>Sportz-Well</h2>

<p>Performance Intelligence</p>

<input id="email" type="email" placeholder="Email Address">

<input id="password" type="password" placeholder="Password">

<button onclick="handleLogin()">Login</button>

</div>


<script>

function handleLogin(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

loginUser(email,password);

}

</script>


</body>

</html>
