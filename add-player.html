<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f2747;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1c3b63;
      padding: 20px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #f4c542;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-bottom: 10px;
    }

    .success {
      color: #00ff99;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Add New Player</h2>

    <div id="message"></div>

    <input id="name" placeholder="Full Name" />
    <input id="std" placeholder="Standard (e.g. 9)" />
    <input id="div" placeholder="Division (e.g. B)" />
    <input id="school_id_no" placeholder="School ID Number" />
    <input id="aadhaar_card_no" placeholder="Aadhaar Number" />
    <input id="dob" type="date" />
    
    <select id="gender">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <button onclick="addPlayer()">Submit</button>
  </div>

  <script>
    const API_BASE = "https://sportz-well-backend.onrender.com";

    async function addPlayer() {
      const messageDiv = document.getElementById("message");
      messageDiv.innerHTML = "";

      const data = {
        name: document.getElementById("name").value,
        std: document.getElementById("std").value,
        div: document.getElementById("div").value,
        school_id_no: document.getElementById("school_id_no").value,
        aadhaar_card_no: document.getElementById("aadhaar_card_no").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value
      };

      try {
        const res = await fetch(`${API_BASE}/api/v1/players`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok) {
          messageDiv.innerHTML = `<div class="error">${result.error || "Failed to add player"}</div>`;
          return;
        }

        messageDiv.innerHTML = `<div class="success">Player added successfully</div>`;

      } catch (err) {
        messageDiv.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }
  </script>

</body>
</html>
